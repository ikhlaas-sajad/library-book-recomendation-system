<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>{% block title %}NextChapter{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<nav>
  <a href="{{ url_for('index') }}" class="logo">⬡ NextChapter</a>
  <div class="nav-actions">
    <a href="{{ url_for('top_rated') }}" class="top-rated-pill">Top Rated</a>
  </div>
</nav>
<main>{% block content %}{% endblock %}</main>
<footer>
  <div style="display:flex;gap:1rem;align-items:center;justify-content:center;flex-wrap:wrap;">
    <span>NextChapter &mdash; Breadth-First Search (BFS)· Min-Heap</span>
  </div>
</footer>
</body>
</html>
